<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="Personalized Permanent Digital Collectible Card">
  <meta name="theme-color" content="#f8fafc">
  <title>Collectible Monument — web100k.com</title>
  <meta name="view-transition" content="same-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="dist/app.css">
  <script>
    (function () {
      var savedTheme = localStorage.getItem('top15000_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    /* ══════════════════════════════════════════
       SQUARE SPLIT NEO-BRUTALIST COLLECTIBLE CARD
       ══════════════════════════════════════════ */
    :root {
      --user-accent: #ff60a8;
      --card-bg: #fdf2f8;
      --border-dark: #4338ca;
      /* Refined deep electric indigo border instead of harsh black */
      --name-color: #6d28d9;
    }

    :root[data-theme="dark"] {
      --card-bg: #221326;
      --border-dark: #f472b6;
      /* Luminous pink/orchid border in dark mode */
      --name-color: #e879f9;
    }

    body {
      position: relative;
      background: #f8fafc;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }



    /* ── Navigation ── */
    .profile-nav {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 32px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .nav-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 3px solid var(--border-dark);
      border-radius: 14px;
      padding: 8px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--border-dark);
      text-decoration: none;
      box-shadow: 3px 3px 0px var(--border-dark);
      transition: all 0.15s ease;
    }

    .nav-back-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px var(--border-dark);
    }

    :root[data-theme="dark"] .nav-back-btn {
      background: #1f1f23;
      color: #ffffff;
      border-color: #f472b6;
      box-shadow: 3px 3px 0px #f472b6;
    }

    /* ── Main Container ── */
    .profile-main {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 16px;
      box-sizing: border-box;
    }

    /* ── PROFILE STANDALONE CARD & ACTIONS ── */
    .profile-card-wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      align-items: center;
      animation: slickCardEntrance 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
      box-sizing: border-box;
      z-index: 5;
    }

    .profile-card-wrapper .lb-card {
      width: 100%;
      margin: 0;
      cursor: default;
      /* Keep stable and not redirect back to itself */
    }

    .profile-card-wrapper .lb-card:hover {
      transform: none !important;
      box-shadow: 6px 8px 0px var(--pop-shadow, rgba(67, 56, 202, 0.25)) !important;
    }

    @keyframes slickCardEntrance {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }



    .profile-actions-under {
      display: flex;
      gap: 16px;
      width: 100%;
      justify-content: center;
      z-index: 10;
    }

    .slick-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 2px solid var(--border-dark);
      border-radius: 14px;
      padding: 10px 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--border-dark);
      box-shadow: 3px 3px 0px rgba(67, 56, 202, 0.25);
      cursor: pointer;
      transition: all 0.15s ease;
      justify-content: center;
      white-space: nowrap;
    }

    .slick-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px rgba(67, 56, 202, 0.25);
    }

    :root[data-theme="dark"] .slick-btn {
      background: #1f1f23;
      border-color: #f472b6;
      color: #ffffff;
      box-shadow: 4px 4px 0px #f472b6;
    }

    :root[data-theme="dark"] .slick-btn:hover {
      box-shadow: 2px 2px 0px #f472b6;
    }

    .slick-btn.liked {
      background: #fdf2f8;
      border-color: #ec4899;
      color: #ec4899;
    }

    /* Footer styling */
    .profile-footer {
      position: relative;
      z-index: 10;
      padding: 16px 24px;
      text-align: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    @media (max-height: 750px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }
    }

    @media (max-width: 480px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }

      .profile-card-wrapper {
        max-width: 100%;
        padding: 0 8px;
      }

      .profile-actions-under {
        flex-direction: column;
        gap: 10px;
        width: 100%;
      }

      .profile-actions-under .slick-btn {
        width: 100%;
      }
    }

    /* ── Profile Social Links ── */
    .profile-social-links-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .profile-social-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 10px;
      border: 2px solid var(--border-dark);
      background: #ffffff;
      color: #475569;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 2px 2px 0px rgba(67, 56, 202, 0.2);
      transition: all 0.15s ease;
    }

    .profile-social-link:hover {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0px rgba(67, 56, 202, 0.2);
    }

    .profile-social-yt:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .profile-social-ig:hover {
      border-color: #e1306c;
      color: #e1306c;
      background: #fdf2f8;
    }

    :root[data-theme="dark"] .profile-social-link {
      background: #1f1f23;
      color: #e2e8f0;
      border-color: #f472b6;
      box-shadow: 2px 2px 0px #f472b6;
    }

    :root[data-theme="dark"] .profile-social-yt:hover {
      background: rgba(255, 0, 0, 0.12);
      color: #ff6b6b;
      border-color: #ff6b6b;
    }

    :root[data-theme="dark"] .profile-social-ig:hover {
      background: rgba(225, 48, 108, 0.12);
      color: #f472b6;
      border-color: #f472b6;
    }
  </style>
</head>

<body>
  <!-- AMBIENT LIVING ATMOSPHERE -->
  <div class="user-ambient-wrapper">
    <div id="user-ambient-bg" class="user-ambient-bg"></div>
  </div>

  <!-- NAVIGATION -->
  <nav class="profile-nav" style="opacity: 0; animation: profileFadeSlideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
    <a href="index.html" class="nav-back-btn">
      <span>←</span>
      <span>Leaderboard</span>
    </a>
      <button class="nav-back-btn" onclick="shareProfile()" title="Share Card" aria-label="Share">
        <span>⚡ Share</span>
      </button>
      <button class="nav-back-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Switch Dark / Light Mode"
        aria-label="Toggle Theme" style="padding: 8px 14px;">
        <span class="theme-icon">🌙</span>
      </button>
  </nav>

  <!-- CARD CONTAINER -->
  <main class="profile-main">
    <div class="profile-card-wrapper">

      <!-- LOADING SKELETON (shown while fetching) -->
      <div class="lb-card profile-skeleton" id="profile-skeleton">
        <div class="lb-card-video-wrap">
          <div class="profile-skeleton-block" style="width: 100%; height: 100%; border-radius: 0;"></div>
        </div>
        <div class="lb-card-content">
          <div class="lb-card-user">
            <div class="profile-skeleton-block profile-skeleton-circle"></div>
            <div class="lb-card-user-info" style="flex: 1;">
              <div class="profile-skeleton-block" style="height: 20px; width: 65%; border-radius: 10px; margin-bottom: 10px;"></div>
              <div class="profile-skeleton-block" style="height: 14px; width: 35%; border-radius: 8px;"></div>
            </div>
          </div>
          <div style="margin-top: 4px;">
            <div class="profile-skeleton-block" style="height: 14px; width: 90%; border-radius: 8px; margin-bottom: 8px;"></div>
            <div class="profile-skeleton-block" style="height: 14px; width: 60%; border-radius: 8px;"></div>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
            <div class="profile-skeleton-block" style="height: 36px; width: 80px; border-radius: 12px;"></div>
            <div class="profile-skeleton-block" style="height: 36px; width: 100px; border-radius: 12px;"></div>
          </div>
        </div>
      </div>

      <!-- ACTUAL CARD (hidden until data loads) -->
      <div class="lb-card profile-card-reveal hidden-card" id="profile-card">

        <!-- SECTION 1: YouTube Video -->
        <div class="lb-card-video-wrap" id="video-wrap-profile">
          <div class="lb-card-video" id="card-video-profile" onclick="playCardVideo()"
            title="Click to play YouTube Video">
            <img id="profile-video-thumb" src="" alt="YouTube Thumbnail">
          </div>
        </div>

        <!-- SECTION 2: Profile Picture, Hashtag Badge, Message, Likes -->
        <div class="lb-card-content">
          <div class="lb-card-user">
            <img id="profile-avatar" class="lb-card-avatar profile-reveal-item" src="" alt="">
            <div class="lb-card-user-info">
              <div class="lb-card-user-top">
                <div id="profile-name" class="lb-card-name profile-reveal-item"></div>
                <span id="place-pill" class="lb-card-place-pill profile-reveal-item"></span>
              </div>
            </div>
          </div>

          <div class="lb-card-message profile-reveal-item" id="profile-message"></div>

          <!-- Social Links -->
          <div class="profile-social-links-wrap profile-reveal-item" id="profile-social-links"></div>

          <div class="lb-card-foot profile-reveal-item">
            <button id="profile-like-btn" class="lb-card-like-btn" onclick="likeProfile()">
              <span id="profile-heart">🤍</span>
              <span id="profile-like-count">0</span>
            </button>
            <span id="profile-price" class="lb-card-price-chip"></span>
          </div>
        </div>

      </div>

      </div>
    </div>
  </main>

  <footer class="profile-footer">
    web100k.com · Permanent Digital Collectible Card
  </footer>

  <!-- TOAST -->
  <div id="toast" class="toast-popup" style="z-index: 3000;"></div>

  <style>
    /* ── Profile Loading Skeleton ── */
    .profile-skeleton-block {
      background: var(--skeleton-bg, #e2e8f0);
      position: relative;
      overflow: hidden;
    }

    .profile-skeleton-block::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.45) 50%, transparent 100%);
      animation: profileShimmer 1.8s ease-in-out infinite;
    }

    :root[data-theme="dark"] .profile-skeleton-block {
      background: #2d3748;
    }

    :root[data-theme="dark"] .profile-skeleton-block::after {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
    }

    .profile-skeleton-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    @keyframes profileShimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .profile-skeleton {
      animation: skeletonPulse 2s ease-in-out infinite alternate;
    }

    @keyframes skeletonPulse {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    /* ── Profile Card Reveal ── */
    .profile-card-reveal {
      animation: profileCardReveal 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes profileCardReveal {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Profile items show instantly (no staggered delay) ── */
    .profile-reveal-item {
      opacity: 1;
      transform: none;
    }

    /* ── Nav entrance ── */
    @keyframes profileFadeSlideDown {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Action buttons entrance ── */
    @keyframes profileActionsReveal {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hidden-card {
      display: none !important;
    }
  </style>

  <script src="profile.js"></script>
</body>

</html>
