<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="Personalized Permanent Digital Collectible Card">
  <meta name="theme-color" content="#f8fafc">
  <title>Collectible Monument — Top50000.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="top15000.css?v=3.0">
  <script>
    (function () {
      var savedTheme = localStorage.getItem('top15000_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    /* ══════════════════════════════════════════
       SQUARE SPLIT NEO-BRUTALIST COLLECTIBLE CARD
       ══════════════════════════════════════════ */
    :root {
      --user-accent: #ff60a8;
      --card-bg: #fdf2f8;
      --border-dark: #4338ca; /* Refined deep electric indigo border instead of harsh black */
      --name-color: #6d28d9;
    }

    :root[data-theme="dark"] {
      --card-bg: #221326;
      --border-dark: #f472b6; /* Luminous pink/orchid border in dark mode */
      --name-color: #e879f9;
    }

    body {
      position: relative;
      background: #f8fafc;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Full-Screen Dynamic Wallpaper & Contrast Layer ── */
    .user-ambient-wrapper {
      position: fixed;
      inset: -10%;
      width: 120%;
      height: 120%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .user-ambient-bg {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: blur(100px) saturate(2.4);
      opacity: 0.45;
      transform: scale(1.15);
      transition: background-image 1s ease-in-out;
      animation: ambientPulse 12s ease-in-out infinite alternate;
    }

    @keyframes ambientPulse {
      0% { transform: scale(1.15) translate(0, 0); opacity: 0.4; }
      50% { transform: scale(1.25) translate(3%, -3%); opacity: 0.5; }
      100% { transform: scale(1.15) translate(-3%, 3%); opacity: 0.42; }
    }

    /* ── Navigation ── */
    .profile-nav {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 32px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .nav-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 3px solid var(--border-dark);
      border-radius: 14px;
      padding: 8px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--border-dark);
      text-decoration: none;
      box-shadow: 3px 3px 0px var(--border-dark);
      transition: all 0.15s ease;
    }

    .nav-back-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px var(--border-dark);
    }

    :root[data-theme="dark"] .nav-back-btn {
      background: #1f1f23;
      color: #ffffff;
      border-color: #f472b6;
      box-shadow: 3px 3px 0px #f472b6;
    }

    /* ── Main Container ── */
    .profile-main {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 16px;
      box-sizing: border-box;
    }

    /* ── SQUARE SPLIT COLLECTIBLE CARD ── */
    .monument-card {
      position: relative;
      width: 100%;
      max-width: 820px;
      min-height: 480px;
      background: var(--card-bg);
      border: 2.5px solid var(--border-dark);
      border-radius: 36px;
      padding: 0;
      overflow: hidden;
      box-shadow: 10px 14px 0px rgba(67, 56, 202, 0.25);
      display: grid;
      grid-template-columns: 340px 1fr;
      align-items: stretch;
      animation: slickCardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards, cardFloatLiving 6s ease-in-out infinite alternate 0.8s;
      box-sizing: border-box;
    }

    :root[data-theme="dark"] .monument-card {
      background: #221326;
      border-color: #f472b6;
      box-shadow: 10px 14px 0px rgba(0, 0, 0, 0.65);
    }

    @keyframes slickCardEntrance {
      0% { opacity: 0; transform: translateY(35px) scale(0.95) rotate(-1.5deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }

    @keyframes cardFloatLiving {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-7px) rotate(0.4deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    /* Left Column: Edge-to-Edge Profile Picture & Floating Price */
    .card-col-left {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 480px;
      border-right: 2.5px solid var(--border-dark);
      overflow: hidden;
      background: #000;
      display: flex;
    }

    :root[data-theme="dark"] .card-col-left {
      border-right-color: #f472b6;
    }

    .avatar-frame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0;
      overflow: hidden;
      background: #ffffff;
      flex: 1;
      position: relative;
    }

    .profile-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-price-sub {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--border-dark);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border: 2px solid var(--border-dark);
      border-radius: 100px;
      padding: 8px 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      text-align: center;
      white-space: nowrap;
      box-sizing: border-box;
    }

    :root[data-theme="dark"] .profile-price-sub {
      background: rgba(31, 18, 35, 0.95);
      color: #f472b6;
      border-color: #f472b6;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
    }

    /* Right Column: Name, Message Box, # Number & Actions */
    .card-col-right {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      padding: 38px 44px;
      min-width: 0;
    }

    .profile-name {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.1rem, 4.5vw, 2.7rem);
      font-weight: 900;
      color: var(--name-color);
      text-transform: uppercase;
      margin: 0 0 16px;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-shadow: 2px 2px 0px rgba(255, 0, 85, 0.6), -2px -2px 0px rgba(0, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* Speech / Message Box */
    .speech-box {
      background: #ffffff;
      border: 2.5px solid var(--border-dark);
      border-radius: 22px;
      padding: 24px 28px;
      margin-bottom: 24px;
      position: relative;
      box-shadow:
        0 6px 0px rgba(244, 114, 182, 0.5),
        0 6px 0px 2.5px var(--border-dark);
      text-align: center;
    }

    :root[data-theme="dark"] .speech-box {
      background: #18181b;
      border-color: #f472b6;
      box-shadow:
        0 8px 0px #db2777,
        0 8px 0px 4px #f472b6;
    }

    .speech-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      font-weight: 700;
      color: var(--border-dark);
      line-height: 1.55;
      margin: 0;
    }

    :root[data-theme="dark"] .speech-text {
      color: #ffffff;
    }

    /* Bottom Row & Place Ribbon */
    .card-bottom-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .place-ribbon-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .place-ribbon {
      background: #ff60a8;
      border: 2.5px solid var(--border-dark);
      border-radius: 12px;
      padding: 8px 36px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--border-dark);
      box-shadow: 4px 5px 0px rgba(67, 56, 202, 0.25);
      position: relative;
      z-index: 2;
    }

    :root[data-theme="dark"] .place-ribbon {
      background: #ec4899;
      color: #ffffff;
      border-color: #f472b6;
      box-shadow: 4px 5px 0px rgba(244, 114, 182, 0.3);
    }

    /* Decorative bracket tabs on sides of ribbon */
    .ribbon-tab-left,
    .ribbon-tab-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 28px;
      background: #ffffff;
      border: 2px solid var(--border-dark);
      z-index: 1;
    }
    .ribbon-tab-left {
      left: -10px;
      border-radius: 6px 0 0 6px;
      box-shadow: -2px 2px 0px rgba(67, 56, 202, 0.2);
    }
    .ribbon-tab-right {
      right: -10px;
      border-radius: 0 6px 6px 0;
      box-shadow: 2px 2px 0px rgba(67, 56, 202, 0.2);
    }

    :root[data-theme="dark"] .ribbon-tab-left,
    :root[data-theme="dark"] .ribbon-tab-right {
      background: #1f1223;
      border-color: #f472b6;
    }

    /* Slick Actions */
    .slick-actions {
      display: flex;
      gap: 14px;
      width: 100%;
      justify-content: center;
    }

    .slick-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 2px solid var(--border-dark);
      border-radius: 14px;
      padding: 8px 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--border-dark);
      box-shadow: 3px 3px 0px rgba(67, 56, 202, 0.25);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .slick-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px rgba(67, 56, 202, 0.25);
    }

    :root[data-theme="dark"] .slick-btn {
      background: #1f1f23;
      border-color: #f472b6;
      color: #ffffff;
      box-shadow: 4px 4px 0px #f472b6;
    }

    :root[data-theme="dark"] .slick-btn:hover {
      box-shadow: 2px 2px 0px #f472b6;
    }

    .slick-btn.liked {
      background: #fdf2f8;
      border-color: #ec4899;
      color: #ec4899;
    }

    /* Footer */
    .profile-footer {
      position: relative;
      z-index: 10;
      padding: 0 24px 16px;
      text-align: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    @media (max-height: 750px), (max-width: 680px) {
      body { height: auto; min-height: 100vh; overflow-y: auto; }
      .monument-card {
        grid-template-columns: 1fr;
        padding: 0;
        max-width: 94%;
        min-height: auto;
      }
      .card-col-left { 
        min-height: 320px; 
        border-right: none; 
        border-bottom: 2.5px solid var(--border-dark); 
      }
      :root[data-theme="dark"] .card-col-left {
        border-bottom-color: #f472b6;
      }
      .card-col-right {
        padding: 28px 22px;
      }
      .profile-name { text-align: center; font-size: 1.8rem; }
      .slick-actions { flex-direction: column; }
      .slick-btn { width: 100%; justify-content: center; }
    }
      .slick-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>

<body>
  <!-- DYNAMIC API WALLPAPER -->
  <div class="dynamic-wallpaper" id="dynamic-wallpaper"></div>
  <div class="wallpaper-overlay" id="wallpaper-overlay"></div>

  <!-- AMBIENT LIVING ATMOSPHERE -->
  <div class="user-ambient-wrapper">
    <div id="user-ambient-bg" class="user-ambient-bg"></div>
  </div>

  <!-- NAVIGATION -->
  <nav class="profile-nav">
    <a href="index.html" class="nav-back-btn">
      <span>←</span>
      <span>Leaderboard</span>
    </a>
    <div style="display: flex; gap: 10px;">
      <button class="nav-back-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Switch Dark / Light Mode" aria-label="Toggle Theme" style="padding: 8px 14px;">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </nav>

  <!-- SQUARE SPLIT COLLECTIBLE CARD -->
  <main class="profile-main">
    <section class="monument-card">
      
      <!-- LEFT COLUMN: BIG PROFILE PICTURE & PRICE -->
      <div class="card-col-left">
        <div class="avatar-frame">
          <img id="profile-avatar" class="profile-avatar" src="" alt="Profile Picture">
        </div>
        <div id="profile-price" class="profile-price-sub">Claimed for ₹1.00</div>
      </div>

      <!-- RIGHT COLUMN: NAME, MESSAGE, # NUMBER & ACTIONS -->
      <div class="card-col-right">
        <h1 id="profile-name" class="profile-name">PIYUSH SAYARE</h1>

        <!-- MIDDLE: SPEECH BOX -->
        <div class="speech-box">
          <p id="profile-message" class="speech-text">“Double digits! Proud to be in the Top 10...”</p>
        </div>

        <!-- BOTTOM: #NUMBER BADGE & ACTIONS -->
        <div class="card-bottom-row">
          <div class="place-ribbon-wrap">
            <span class="ribbon-tab-left"></span>
            <div id="place-pill" class="place-ribbon">#5000</div>
            <span class="ribbon-tab-right"></span>
          </div>

          <div class="slick-actions">
            <button id="profile-like-btn" class="slick-btn" onclick="likeProfile()">
              <span id="profile-heart">🤍</span> <span id="profile-like-count">0</span>
            </button>
            <button class="slick-btn" onclick="shareProfile()">
              ⚡ Share Card
            </button>
          </div>
        </div>
      </div>

    </section>
  </main>

  <footer class="profile-footer">
    Top50000.com · Permanent Digital Collectible Card
  </footer>

  <!-- TOAST -->
  <div id="toast" class="toast-popup" style="z-index: 3000;"></div>

  <script src="profile.js?v=4.0"></script>
</body>

</html>
