<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Insta Card</title>
    <meta name="description" content="Premium content card showcase.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; min-height:100%; font-family:'Inter', sans-serif;
            background:#06091a; display:flex; align-items:center; justify-content:center;
        }

        /* Aurora */
        .aurora {
            position:fixed; inset:0; z-index:0; overflow:hidden;
            background:radial-gradient(ellipse at 15% 15%, #0f0735 0%, #06091a 65%);
        }
        .ab { position:absolute; border-radius:50%; filter:blur(100px); opacity:.7; }
        .ab:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,rgba(110,40,255,.5),transparent 70%);top:-180px;left:-180px;animation:af1 14s ease-in-out infinite;}
        .ab:nth-child(2){width:480px;height:480px;background:radial-gradient(circle,rgba(220,39,67,.5),transparent 70%);top:-80px;right:-100px;animation:af2 11s ease-in-out infinite;}
        .ab:nth-child(3){width:420px;height:420px;background:radial-gradient(circle,rgba(252,176,69,.28),transparent 70%);bottom:-140px;left:28%;animation:af3 16s ease-in-out infinite;}
        .ab:nth-child(4){width:320px;height:320px;background:radial-gradient(circle,rgba(30,215,130,.16),transparent 70%);bottom:-70px;right:-50px;animation:af1 12s ease-in-out infinite reverse;}
        @keyframes af1{0%,100%{transform:translate(0,0)scale(1)}40%{transform:translate(55px,-45px)scale(1.07)}70%{transform:translate(-25px,38px)scale(.94)}}
        @keyframes af2{0%,100%{transform:translate(0,0)scale(1)}35%{transform:translate(-45px,55px)scale(1.1)}70%{transform:translate(38px,-28px)scale(.92)}}
        @keyframes af3{0%,100%{transform:translate(0,0)scale(1)}40%{transform:translate(-55px,-38px)scale(1.05)}75%{transform:translate(48px,28px)scale(.97)}}

        #ptcl{position:fixed;inset:0;z-index:1;pointer-events:none;}

        .back-btn{
            position:fixed;top:20px;left:22px;z-index:200;
            color:rgba(255,255,255,.68);text-decoration:none;
            font-size:.8rem;font-weight:600;
            display:flex;align-items:center;gap:6px;
            padding:8px 16px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.11);
            border-radius:100px;backdrop-filter:blur(18px);
            transition:all .3s ease;letter-spacing:.3px;
        }
        .back-btn:hover{background:rgba(255,255,255,.14);color:#fff;transform:translateX(-4px);}

        .page-wrap{
            position:relative;z-index:10;
            padding:80px 16px 56px;
            display:flex;align-items:center;justify-content:center;
            width:100%;
        }

        /* THE CARD */
        .card{
            position:relative;width:100%;max-width:420px;
            border-radius:28px;overflow:hidden;
            background:rgba(10,12,32,.88);
            backdrop-filter:blur(28px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,.07),
                0 28px 70px rgba(0,0,0,.65),
                0 0 70px rgba(120,40,255,.12),
                inset 0 1px 0 rgba(255,255,255,.1);
            opacity:0; transform:translateY(60px)scale(.9);
            animation:rise .95s cubic-bezier(.34,1.56,.64,1) .15s forwards;
        }
        @keyframes rise{to{opacity:1;transform:translateY(0)scale(1)}}
        .card::before{
            content:'';position:absolute;inset:0;z-index:0;border-radius:28px;
            padding:1.2px;
            background:conic-gradient(from 0deg,#7928ca,#dc2743,#fcb045,#5b4cf9,#7928ca);
            -webkit-mask:linear-gradient(#000 0 0)content-box,linear-gradient(#000 0 0);
            -webkit-mask-composite:xor;mask-composite:exclude;
            animation:bspin 7s linear infinite;pointer-events:none;
        }
        @keyframes bspin{to{filter:hue-rotate(360deg)}}

        /* Cover section */
        .cover-section{
            position:relative;z-index:1;width:100%;overflow:hidden;
        }
        .cover-img{
            width:100%;aspect-ratio:4/3;
            object-fit:cover;object-position:center top;display:block;
        }
        .cover-placeholder{
            width:100%;aspect-ratio:4/3;
            background:linear-gradient(135deg,#1a0e45 0%,#3a1260 45%,#1a0e45 100%);
            display:flex;align-items:center;justify-content:center;
        }
        .cover-placeholder-icon{font-size:5rem;opacity:.18;}
        .cover-fade{
            position:absolute;bottom:0;left:0;right:0;height:90px;
            background:linear-gradient(to bottom,transparent,rgba(10,12,32,.97));
        }
        .cover-badge{
            position:absolute;top:14px;right:14px;z-index:2;
            display:inline-flex;align-items:center;gap:6px;
            padding:5px 13px 5px 9px;border-radius:100px;
            font-size:.68rem;font-weight:700;letter-spacing:.9px;
            text-transform:uppercase;color:#fff;
            box-shadow:0 4px 16px rgba(0,0,0,.4);
            backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);
        }
        .cover-badge.instagram{background:linear-gradient(90deg,rgba(121,40,202,.88),rgba(220,39,67,.88),rgba(252,176,69,.88));}
        .cover-badge.youtube{background:rgba(200,0,0,.88);}
        .cover-badge .bi{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:.62rem;}

        /* Divider */
        .divider{
            position:relative;z-index:1;
            display:flex;align-items:center;gap:12px;
            padding:0 22px;
        }
        .divider .dl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);}
        .divider .dd{width:7px;height:7px;border-radius:1.5px;background:linear-gradient(135deg,#7928ca,#fcb045);transform:rotate(45deg);box-shadow:0 0 7px rgba(252,176,69,.4);}

        /* YouTube thumbnail strip */
        .yt-thumb-strip{
            position:relative;z-index:1;
            margin:0 20px;
            border-radius:16px;overflow:hidden;
            cursor:pointer;
            box-shadow:0 10px 36px rgba(0,0,0,.55);
            transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease;
        }
        .yt-thumb-strip:hover{transform:translateY(-5px)scale(1.015);box-shadow:0 22px 55px rgba(0,0,0,.75),0 0 35px rgba(220,39,67,.28);}
        .yt-thumb-strip img{
            width:100%;aspect-ratio:16/9;object-fit:cover;display:block;
            opacity:.65;transition:opacity .3s ease;
        }
        .yt-thumb-strip:hover img{opacity:.85;}
        .yt-strip-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(80,20,180,.35),rgba(220,39,67,.22));}
        .yt-strip-shimmer{
            position:absolute;inset:0;
            background:linear-gradient(90deg,transparent 35%,rgba(255,255,255,.05) 50%,transparent 65%);
            background-size:200% 100%;animation:shim 3.5s ease-in-out infinite;
        }
        @keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .yt-play-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
        .yt-play-ring{
            width:62px;height:62px;border-radius:50%;
            background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.4);
            backdrop-filter:blur(8px);
            display:flex;align-items:center;justify-content:center;
            transition:all .35s cubic-bezier(.34,1.56,.64,1);
            animation:plsPulse 2.5s ease-in-out infinite;
        }
        .yt-thumb-strip:hover .yt-play-ring{
            transform:scale(1.22);
            background:rgba(220,39,67,.6);border-color:rgba(255,255,255,.7);
            box-shadow:0 0 28px rgba(220,39,67,.65);
        }
        @keyframes plsPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.18)}50%{box-shadow:0 0 0 14px rgba(255,255,255,0)}}
        .yt-play-tri{width:0;height:0;border-top:11px solid transparent;border-bottom:11px solid transparent;border-left:20px solid rgba(255,255,255,.92);margin-left:4px;}
        .yt-strip-label{
            position:absolute;bottom:10px;left:12px;
            background:rgba(0,0,0,.68);backdrop-filter:blur(6px);
            border:1px solid rgba(255,255,255,.1);
            padding:4px 11px;border-radius:100px;
            font-size:.62rem;font-weight:700;letter-spacing:.7px;
            color:rgba(255,255,255,.88);text-transform:uppercase;
        }

        /* Reel play button */
        .reel-play-bar{position:relative;z-index:1;margin:0 20px;}
        .reel-play-btn{
            width:100%;padding:17px 28px;
            background:linear-gradient(135deg,#7928ca 0%,#dc2743 55%,#fcb045 100%);
            border:none;border-radius:16px;cursor:pointer;
            font-family:'Inter',sans-serif;
            font-size:.95rem;font-weight:800;color:#fff;
            letter-spacing:.4px;position:relative;overflow:hidden;
            box-shadow:0 10px 34px rgba(220,39,67,.42);
            transition:all .38s cubic-bezier(.34,1.56,.64,1);
            display:flex;align-items:center;justify-content:center;gap:13px;
        }
        .reel-play-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 55%);pointer-events:none;}
        .reel-play-btn::after{
            content:'';position:absolute;top:-50%;left:-75%;
            width:50%;height:200%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
            transform:skewX(-25deg);transition:left .55s ease;
        }
        .reel-play-btn:hover::after{left:125%;}
        .reel-play-btn:hover{transform:translateY(-4px)scale(1.02);box-shadow:0 18px 50px rgba(220,39,67,.62);}
        .reel-play-btn:active{transform:translateY(-2px)scale(1.01);}
        .reel-play-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .reel-play-tri{width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:15px solid rgba(255,255,255,.92);margin-left:3px;}

        /* Like + Price bar */
        .like-price-bar{
            position:relative;z-index:1;
            display:flex;align-items:center;justify-content:space-between;
            padding:16px 22px 22px;
        }
        .like-btn{
            display:flex;align-items:center;gap:7px;
            background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.1);
            border-radius:100px;padding:9px 18px;
            cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);
            color:rgba(255,255,255,.68);font-family:'Inter',sans-serif;
            font-size:.82rem;font-weight:700;
        }
        .like-btn:hover{background:rgba(220,39,67,.15);border-color:rgba(220,39,67,.4);color:#fff;transform:scale(1.06);}
        .like-btn.liked{background:rgba(220,39,67,.2);border-color:rgba(220,39,67,.5);color:#ff6b8a;}
        .heart-svg{width:18px;height:18px;transition:transform .3s;}
        .heart-svg path{fill:none;stroke:currentColor;stroke-width:2;transition:fill .25s,stroke .25s;}
        .like-btn.liked .heart-svg{transform:scale(1.18);}
        .like-btn.liked .heart-svg path{fill:#ff4d6d;stroke:#ff4d6d;}
        .like-pop{animation:heartPop .42s cubic-bezier(.36,.07,.19,.97) both;}
        @keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.55)}70%{transform:scale(.9)}100%{transform:scale(1)}}
        .price-chip{
            display:flex;align-items:center;gap:5px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.1);
            border-radius:100px;padding:9px 18px;
        }
        .price-rupee{font-size:.75rem;color:rgba(252,176,69,.75);font-weight:800;}
        .price-val{font-size:.9rem;font-weight:800;color:#fff;letter-spacing:.3px;}

        .card-foot{
            position:relative;z-index:1;
            padding:6px 22px 18px;text-align:center;
            font-size:.6rem;color:rgba(255,255,255,.16);
            letter-spacing:1.5px;text-transform:uppercase;
        }
        .card-foot span{color:rgba(220,39,67,.38);}

        /* Error */
        .error-state{text-align:center;color:rgba(255,255,255,.55);padding:44px 28px;}
        .error-state .err-e{font-size:3.2rem;margin-bottom:14px;}
        .error-state p{font-size:.92rem;line-height:1.6;margin-bottom:18px;}
        .error-state a{color:#dc2743;text-decoration:none;font-weight:700;border-bottom:1px solid rgba(220,39,67,.3);padding-bottom:2px;}

        /* Video Modal */
        .vid-modal{
            position:fixed;inset:0;z-index:1000;
            background:rgba(0,0,0,.88);
            display:none;align-items:center;justify-content:center;
            backdrop-filter:blur(14px);padding:18px;
        }
        .vid-modal.show{display:flex;}
        .vm-wrap{
            position:relative;width:90vw;max-width:720px;
            aspect-ratio:16/9;border-radius:20px;overflow:hidden;
            background:#000;
            box-shadow:0 40px 100px rgba(0,0,0,.75),0 0 60px rgba(121,40,202,.3);
            animation:mPop .4s cubic-bezier(.34,1.56,.64,1);
        }
        .vm-wrap.vertical{max-width:380px;height:74vh;aspect-ratio:auto;}
        @keyframes mPop{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
        .vm-wrap iframe,.vm-wrap video{width:100%;height:100%;border:none;}
        .vm-close{
            position:absolute;top:-15px;right:-15px;
            width:36px;height:36px;border-radius:50%;
            background:rgba(220,39,67,.9);border:2px solid rgba(255,255,255,.3);
            color:#fff;font-size:.8rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            z-index:10;transition:all .25s;box-shadow:0 4px 14px rgba(220,39,67,.5);
        }
        .vm-close:hover{background:#dc2743;transform:scale(1.15) rotate(90deg);}

        @media(max-width:480px){
            .card{border-radius:22px;}
            .yt-thumb-strip,.reel-play-bar{margin:0 14px;}
            .like-price-bar{padding:14px 16px 18px;}
            .divider{padding:0 16px;}
        }
    </style>
</head>
<body>
    <div class="aurora">
        <div class="ab"></div><div class="ab"></div>
        <div class="ab"></div><div class="ab"></div>
    </div>
    <canvas id="ptcl"></canvas>
    <a href="/" class="back-btn" id="backBtn">&#8592; Back</a>

    <div class="page-wrap">
        <div class="card" id="card"></div>
    </div>

    <div class="vid-modal" id="vmodal" onclick="closeVid(event)">
        <div class="vm-wrap" id="vmwrap" onclick="event.stopPropagation()">
            <button class="vm-close" onclick="closeVid()" title="Close">&#10005;</button>
            <div id="vslot"></div>
        </div>
    </div>

    <script>
    /* 1. Decode */
    const params = new URLSearchParams(location.search);
    let card = null;
    try {
        if (params.get('data')) {
            const raw = params.get('data');
            try { card = JSON.parse(atob(raw)); }
            catch(e2) { card = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(raw))))); }
        }
    } catch(e) {}

    /* 2. Helpers */
    function ytId(url) {
        if (!url) return null;
        const m = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/);
        return (m && m[2] && m[2].length === 11) ? m[2] : null;
    }
    function isShorts(url) { return !!(url && /youtube\.com\/shorts\//i.test(url)); }
    function isYTFull(url)  { return !!ytId(url) && !isShorts(url); }
    function getPF(url) {
        if (!url) return { type:'ig', label:'Reel', cls:'instagram' };
        if (isYTFull(url))  return { type:'yt', label:'YouTube', cls:'youtube' };
        if (isShorts(url))  return { type:'sh', label:'Shorts',  cls:'youtube' };
        return { type:'ig', label:'Reel', cls:'instagram' };
    }

    /* 3. Render */
    const cardEl = document.getElementById('card');
    if (card) {
        const pf    = getPF(card.reelLink);
        const vid   = ytId(card.reelLink);
        const price = Number(card.price || 0).toLocaleString('en-IN');
        const likes = Number(card.likes  || 0);
        document.title = (card.name ? '@' + card.name + ' \u2014 ' : '') + 'Pyramid Card';

        /* Cover: prefer card.coverImage, fall back to profilePicture */
        const coverSrc = card.coverImage || card.profilePicture || '';
        const coverHTML = coverSrc
            ? `<img class="cover-img" src="${coverSrc}" alt="Cover" onerror="this.outerHTML='<div class=cover-placeholder><div class=cover-placeholder-icon>&#128248;</div></div>'">`
            : `<div class="cover-placeholder"><div class="cover-placeholder-icon">&#128248;</div></div>`;

        /* Media block */
        let mediaHTML = '';
        if (pf.type === 'yt' && vid) {
            const yt = `https://img.youtube.com/vi/${vid}/hqdefault.jpg`;
            mediaHTML = `
              <div class="yt-thumb-strip" id="vidThumb" onclick="openVid()" role="button" tabindex="0">
                <img src="${yt}" alt="Thumbnail" onerror="this.src='https://img.youtube.com/vi/${vid}/mqdefault.jpg'">
                <div class="yt-strip-overlay"></div>
                <div class="yt-strip-shimmer"></div>
                <div class="yt-play-center"><div class="yt-play-ring"><div class="yt-play-tri"></div></div></div>
                <div class="yt-strip-label">&#9654; Play Video</div>
              </div>`;
        } else {
            const lbl = pf.type === 'sh' ? '&#9654;&nbsp; Play Short' : '&#9654;&nbsp; Play Reel';
            mediaHTML = `
              <div class="reel-play-bar">
                <button class="reel-play-btn" id="vidThumb" onclick="openVid()">
                  <div class="reel-play-icon"><div class="reel-play-tri"></div></div>
                  <span>${lbl}</span>
                </button>
              </div>`;
        }

        cardEl.innerHTML = `
          <div class="cover-section">
            ${coverHTML}
            <div class="cover-fade"></div>
            <span class="cover-badge ${pf.cls}">
              <span class="bi">${pf.type !== 'ig' ? '&#9654;' : '&#128248;'}</span>
              ${pf.label}
            </span>
          </div>
          <div class="divider" style="margin:18px 0 14px;">
            <div class="dl"></div><div class="dd"></div><div class="dl"></div>
          </div>
          ${mediaHTML}
          <div class="divider" style="margin:14px 0 0;">
            <div class="dl"></div><div class="dd"></div><div class="dl"></div>
          </div>
          <div class="like-price-bar">
            <button class="like-btn" id="likeBtn" onclick="handleLike()" aria-label="Like">
              <svg class="heart-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
              <span class="like-count" id="likeCount">${likes}</span>
            </button>
            <div class="price-chip">
              <span class="price-rupee">&#8377;</span>
              <span class="price-val">${price}</span>
            </div>
          </div>
          <div class="card-foot">Powered by <span>Pyramid &#10022;</span></div>`;

        document.getElementById('vidThumb')?.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openVid(); }
        });
    } else {
        cardEl.innerHTML = `
          <div class="error-state">
            <div class="err-e">&#128532;</div>
            <p>Card not found or link is invalid.</p>
            <a href="/">&#8592; Back to Gallery</a>
          </div>`;
    }

    /* 4. Like (local) */
    let localLiked = false;
    let localLikes = Number(card?.likes || 0);
    function handleLike() {
        const btn = document.getElementById('likeBtn');
        const cnt = document.getElementById('likeCount');
        if (!btn || !cnt) return;
        localLiked = !localLiked;
        localLikes = localLiked ? localLikes + 1 : Math.max(0, localLikes - 1);
        btn.classList.toggle('liked', localLiked);
        cnt.textContent = localLikes;
        btn.classList.add('like-pop');
        btn.addEventListener('animationend', () => btn.classList.remove('like-pop'), {once:true});
    }

    /* 5. Video modal */
    function openVid() {
        if (!card) return;
        const wrap  = document.getElementById('vmwrap');
        const vslot = document.getElementById('vslot');
        const vid   = ytId(card.reelLink);
        const sh    = isShorts(card.reelLink);
        wrap.className = 'vm-wrap'; vslot.innerHTML = '';
        if (vid) {
            if (sh) wrap.classList.add('vertical');
            vslot.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0"
                allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>`;
        } else if (card.reelLink) {
            wrap.classList.add('vertical');
            const cu = card.reelLink.split('?')[0].replace(/\/?$/, '/');
            vslot.innerHTML = `<blockquote class="instagram-media"
                data-instgrm-permalink="${cu}" data-instgrm-version="14"
                style="background:#FFF;border:0;margin:0;min-width:310px;width:100%;"></blockquote>`;
            if (!document.getElementById('ig-s')) {
                const s = document.createElement('script');
                s.id='ig-s'; s.src='https://www.instagram.com/embed.js'; s.async=true;
                document.body.appendChild(s);
            } else if (window.instgrm) window.instgrm.Embeds.process();
        }
        document.getElementById('vmodal').classList.add('show');
    }
    function closeVid(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('vmodal').classList.remove('show');
        document.getElementById('vslot').innerHTML = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVid(); });

    /* 6. Particles */
    const cv=document.getElementById('ptcl');
    const cx=cv.getContext('2d');
    const rs=()=>{cv.width=innerWidth;cv.height=innerHeight;};
    rs(); addEventListener('resize',rs);
    const COLS=['#7928ca','#dc2743','#fcb045','rgba(255,255,255,.55)','#5b4cf9'];
    const pts=Array.from({length:90},()=>({
        x:Math.random()*innerWidth,y:Math.random()*innerHeight,
        r:Math.random()*1.6+.3,
        vx:(Math.random()-.5)*.28,vy:-(Math.random()*.38+.1),
        a:Math.random()*.48+.1,
        c:COLS[Math.floor(Math.random()*COLS.length)]
    }));
    (function loop(){
        cx.clearRect(0,0,cv.width,cv.height);
        pts.forEach(p=>{
            cx.save();cx.globalAlpha=p.a;cx.fillStyle=p.c;
            cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();cx.restore();
            p.x+=p.vx;p.y+=p.vy;
            if(p.y<-8){p.y=cv.height+5;p.x=Math.random()*cv.width;}
            if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;
        });
        requestAnimationFrame(loop);
    })();
    </script>
</body>
