<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Insta Cards - Discover and collect creative social media cards">
    <meta name="keywords" content="instagram, reels, cards, collector, social media">
    <meta name="author" content="Insta Cards">
    <meta property="og:title" content="Insta Cards">
    <meta property="og:description" content="Discover and collect creative social media cards">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#1a0a2e">
    <meta name="robots" content="index, follow">
    <!-- PWA mobile -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
    <title>Insta Cards - Social Media Collector</title>
    <link rel="stylesheet" href="style.css?v=7.2">
</head>

<body>
    <div class="container">

        <!-- ── HEADER ── -->
        <header class="header">
            <div class="header-content">
                <h1>✨ Pyramid Gallery</h1>
                <p class="header-sub">Curated Social Design Collection</p>
            </div>
            <div class="header-actions">
                <button class="insert-btn" onclick="openInsertModal()">➕ Create</button>
            </div>
        </header>



        <!-- ── CONTROLS BAR ── -->
        <div class="controls-bar">
            <div class="sort-group">
                <span class="sort-label">Sort</span>
                <button class="sort-btn active" data-sort="price" onclick="sortLeaderboard('price')">💰 Price</button>
                <button class="sort-btn" data-sort="likes" onclick="sortLeaderboard('likes')">❤️ Likes</button>
                <button class="sort-btn" data-sort="random" onclick="sortLeaderboard('random')">🔀 Random</button>
            </div>
            <div class="search-group">
                <span class="search-icon-wrap">🔍</span>
                <input
                    type="search"
                    id="search-input"
                    class="search-input"
                    placeholder="Search name, message, price…"
                    oninput="onSearchInput()"
                    autocomplete="off"
                >
                <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Clear">✕</button>
            </div>
        </div>

        <!-- ── DESIGN CARD GALLERY ── -->
        <section class="content-section active-section" id="gallery-section">
            <div class="insta-cards-grid" id="insta-cards-grid">
                <!-- All content cards rendered here -->
            </div>
        </section>

    </div><!-- /.container -->

    <!-- ── CREATE CARD MODAL ── -->
    <div id="insert-modal" class="modal-overlay" onclick="closeInsertModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>Create New Card</h2>
                <button class="close-btn" onclick="closeInsertModal()">✕</button>
            </div>
            <form id="insert-form" onsubmit="handleInsertSubmit(event)">
                <div class="form-group">
                    <label for="insert-name">Creator Name</label>
                    <input type="text" id="insert-name" placeholder="Enter creator name">
                </div>
                <div class="form-group">
                    <label for="insert-profile">Profile Picture URL</label>
                    <input type="url" id="insert-profile" placeholder="https://example.com/profile.jpg">
                </div>
                <div class="form-group">
                    <label for="insert-cover">Cover Image URL <span style="font-size:.72rem;color:rgba(255,255,255,.4);font-weight:400;">(optional — shown on card front)</span></label>
                    <input type="url" id="insert-cover" placeholder="https://example.com/cover.jpg (defaults to profile pic)">
                </div>
                <div class="form-group">
                    <label for="insert-message">Card Message</label>
                    <textarea id="insert-message" placeholder="Enter your card message or motto"></textarea>
                </div>
                <div class="form-group">
                    <label for="insert-reel">Video Link</label>
                    <input type="url" id="insert-reel" placeholder="Instagram Reel, YouTube Short or Video link">
                </div>
                <div class="form-group">
                    <label for="insert-price">Card Price (₹)</label>
                    <input type="number" id="insert-price" placeholder="Enter price" min="0">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeInsertModal()">Cancel</button>
                    <button type="submit" class="btn-submit">Create Card ✨</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── VIDEO MODAL ── -->
    <div id="reel-modal" class="modal-overlay" onclick="closeReelModal(event)">
        <div class="reel-modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeReelModal()">✕</button>
            <div class="reel-player-container" id="reel-player-container">
                <!-- Embedded player loaded here -->
            </div>
        </div>
    </div>

    <script src="script.js?v=7.0"></script>
</body>

</html>
